version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_API_BASE=${LLM_API_BASE}
      - LLM_MODEL=${LLM_MODEL:-deepseek-chat}
      - LLM_TEMPERATURE=${LLM_TEMPERATURE:-0.1}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - ADMIN_DB_URL=mysql+mysqlconnector://text2sql:text2sql123@mysql:3306/text2sql_admin
      - SECRET_KEY=${SECRET_KEY:-change-this-in-production}
    depends_on:
      - redis
      - chromadb
      - mysql
    volumes:
      - ./backend:/app
    networks:
      - text2sql-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - text2sql-network

  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8001:8000"
    volumes:
      - chroma-data:/chroma/chroma
    environment:
      - CHROMA_SERVER_AUTH_CREDENTIALS=test:test
    networks:
      - text2sql-network

  mysql:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword
      - MYSQL_DATABASE=text2sql_demo
      - MYSQL_USER=text2sql
      - MYSQL_PASSWORD=text2sql123
    volumes:
      - mysql-data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - text2sql-network

volumes:
  redis-data:
  mysql-data:
  chroma-data:

networks:
  text2sql-network:
    driver: bridge
